version: '3.8'

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:6
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
      - "29092:29092"
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=http://auth-service:8000
      - FM_SERVICE_URL=http://fm-service:8001
      - HR_SERVICE_URL=http://hr-service:8003
      - SCM_SERVICE_URL=http://scm-service:8006
      - M_SERVICE_URL=http://mfg-service:8004
      - CRM_SERVICE_URL=http://crm-service:8002
      - PM_SERVICE_URL=http://prj-service:8005
    depends_on:
      - auth-service
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - JWT_SECRET=${JWT_SECRET}
      - KAFKA_BROKERS=kafka:9092
    restart: unless-stopped

  fm-service:
    build:
      context: .
      dockerfile: services/fm-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - KAFKA_BROKERS=kafka:9092
    restart: unless-stopped

  crm-service:
    build:
      context: .
      dockerfile: services/crm-service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - KAFKA_BROKERS=kafka:9092
    restart: unless-stopped

  hr-service:
    build:
      context: .
      dockerfile: services/hr-service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - KAFKA_BROKERS=kafka:9092
    restart: unless-stopped

  mfg-service:
    build:
      context: .
      dockerfile: services/mfg-service/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
      - KAFKA_BROKERS=kafka:9092
    restart: unless-stopped

  pm-service:
    build:
      context: .
      dockerfile: services/prj-service/Dockerfile
    ports:
      - "8005:8005"
    environment:
      - PORT=8005
      - KAFKA_BROKERS=kafka:9092
    restart: unless-stopped

  scm-service:
    build:
      context: .
      dockerfile: services/scm-service/Dockerfile
    ports:
      - "8006:8006"
    environment:
      - PORT=8006
      - KAFKA_BROKERS=kafka:9092
    restart: unless-stopped

volumes:
  postgres_data: