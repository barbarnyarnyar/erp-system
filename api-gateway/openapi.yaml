components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        legal_entity_id:
          description: Primitive Ref -> FM.LegalEntity (Loose Cross-Domain Link)
          type: string
          format: uuid
        username:
          description: Unique within tenant boundary
          type: string
        email:
          description: Unique within tenant boundary
          type: string
        password_hash:
          description: bcrypt hash — never returned in API responses
          type: string
        first_name:
          type: string
        last_name:
          type: string
        status:
          description: ACTIVE / INACTIVE / SUSPENDED
          $ref: '#/components/schemas/UserStatus'
        security_stamp:
          description: Rotated on every password change — invalidates all sessions
          type: string
        version:
          description: Concurrency Control Shield (Optimistic Locking)
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          description: GORM Native Soft Delete Support
          type: string
          format: date-time
    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        refresh_token:
          description: Cryptographically random — used for token refresh
          type: string
        ip_address:
          description: Audit trail for security forensics
          type: string
        user_agent:
          description: Device fingerprint for anomaly detection
          type: string
        is_revoked:
          description: Explicitly revoked sessions (logout / admin force)
          type: boolean
        expires_at:
          description: Hard expiry — cron purges stale sessions
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        legal_entity_id:
          description: Roles are scoped per tenant
          type: string
          format: uuid
        name:
          description: e.g., "ADMIN", "MANAGER", "VIEWER"
          type: string
        description:
          type: string
        version:
          description: OCC Shield
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Permission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        legal_entity_id:
          type: string
          format: uuid
        code:
          description: e.g., "invoices:write", "employees:read"
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UserRole:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role_id:
          type: string
          format: uuid
        assigned_by_user_id:
          description: Audit trail — who granted this role
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
    RolePermission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role_id:
          type: string
          format: uuid
        permission_id:
          type: string
          format: uuid
        assigned_by_user_id:
          description: Audit trail — who granted this permission
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
    UserStore:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        store_id:
          description: Primitive Ref -> store context (Loose Cross-Domain Link)
          type: string
          format: uuid
        assigned_by_user_id:
          type: string
          format: uuid
        assigned_at:
          type: string
          format: date-time
    TokenClaims:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        legal_entity_id:
          type: string
          format: uuid
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
    CreateUserInput:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        legal_entity_id:
          type: string
          format: uuid
        initial_store_id:
          type: string
          format: uuid
        role_ids:
          type: array
          items:
            type: string
            format: uuid
    CustomerProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        legal_entity_id:
          description: Primitive Ref -> FM.LegalEntity
          type: string
          format: uuid
        customer_code:
          description: Unique business key per tenant
          type: string
        company_name:
          type: string
        account_manager_hr_id:
          description: Primitive Ref -> HR.Employee
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/CustomerStatus'
        credit_limit:
          type: number
          format: float
        currency:
          description: ISO 4217 code
          type: string
        contact_name:
          type: string
        email:
          type: string
        phone:
          type: string
        category:
          type: string
        parent_customer_id:
          type: string
          format: uuid
        version:
          description: Optimistic Locking Shield
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
    PriceBookHeader:
      type: object
